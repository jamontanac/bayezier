[workspace]
name = "bayezier"
version = "0.1.0"
description = "Rust-first Bayesian kNN monorepo with parity tooling"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64"]

[dependencies]
# Python interpreter
python = ">=3.12,<3.13"
numpy = ">=2"
cargo-nextest = ">=0.9"

[feature.dev.dependencies]
cargo-insta = ">=1.43,<2"
maturin = ">=1.5,<2.0"
rust = ">=1.85"
rust-src = "*"
uv = ">=0.10.1" # UV for maturin (maturin develop --uv)

[tasks]
rust-check = { cmd = "cargo check --workspace", cwd = "rust" }
rust-test = { cmd = "cargo nextest run --workspace", cwd = "rust" }
rust-benchmark = { cmd = "cargo run -p pnn-cli -- --train ../data/sample_train.csv --test ../data/sample_test.csv --out ../benchmarks/out/rust.json --dataset sample --implementation rust --k 3 --beta-step 0.3 --beta-sigma 5.0", cwd = "rust" }
py-build = { cmd = "maturin develop --manifest-path rust/pnn-py/Cargo.toml --uv --features extension-module" }
py-smoke = { cmd = "python -c \"import pnn_py; print('pnn_py import OK')\"" }
py-benchmark = { cmd = "python benchmarks/run_rust_py.py --train data/sample_train.csv --test data/sample_test.csv --out benchmarks/out/rust_py.json --dataset sample --implementation rust-py --k 3 --n-samples 50 --burn-in 10 --seed 1" }
py-benchmark-arrays = { cmd = "python benchmarks/run_rust_py_arrays.py --train data/sample_train.csv --test data/sample_test.csv --out benchmarks/out/rust_py_arrays.json --dataset sample --implementation rust-py-arrays --k 3 --n-samples 50 --burn-in 10 --seed 1" }
compare = { cmd = "python benchmarks/compare.py --rust-output benchmarks/out/rust.json --baseline-output benchmarks/out/rust_baseline.json --tolerance 1e-4" }
parity = { cmd = "pixi run rust-benchmark && python benchmarks/compare.py --rust-output benchmarks/out/rust.json --baseline-output benchmarks/out/rust_baseline.json --tolerance 1e-4" }

[activation]
env = { DYLD_FALLBACK_LIBRARY_PATH = "$PIXI_PROJECT_ROOT/.pixi/envs/dev/lib", LD_LIBRARY_PATH = "$PIXI_PROJECT_ROOT/.pixi/envs/dev/lib" }

[environments]
dev = ["dev"]
